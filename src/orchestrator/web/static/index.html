<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGC Orchestrator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --primary:  #58a6ff;
    --success:  #3fb950;
    --warning:  #d29922;
    --error:    #f85149;
    --muted:    #8b949e;
    --text:     #c9d1d9;
    --text-hi:  #e6edf3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; color: var(--text-hi); font-weight: 600; }
  #run-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--border);
    color: var(--muted);
  }
  #run-badge.running  { background: #1f3d6e; color: var(--primary); }
  #run-badge.done     { background: #1a3326; color: var(--success); }
  #run-badge.error    { background: #3d1f1f; color: var(--error);   }
  #run-id-label { font-size: 11px; color: var(--muted); font-family: monospace; }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr 300px;
    grid-template-rows: auto 1fr;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Panel base ── */
  .panel {
    border-right: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--muted);
    padding: 10px 14px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Controls ── */
  #controls { grid-column: 1; grid-row: 1 / 3; }

  .form-group { padding: 10px 14px; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-hi);
    padding: 6px 8px;
    font-size: 12px;
    font-family: inherit;
    resize: vertical;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--primary);
  }
  #btn-start {
    margin: 8px 14px;
    width: calc(100% - 28px);
    background: var(--primary);
    color: #0d1117;
    border: none;
    border-radius: 6px;
    padding: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
  }
  #btn-start:hover { opacity: .9; }
  #btn-start:disabled { opacity: .4; cursor: not-allowed; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 6px 0; }

  /* ── Summary box ── */
  #summary-box {
    margin: 0 14px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    display: none;
  }
  #summary-box.visible { display: block; }
  #summary-box .row { display: flex; justify-content: space-between; padding: 2px 0; }
  #summary-box .row .val { color: var(--text-hi); font-weight: 600; }

  /* ── Pipeline steps ── */
  #pipeline { grid-column: 2; grid-row: 1; overflow-y: auto; border-bottom: 1px solid var(--border); }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    padding: 10px 14px;
  }

  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
    transition: border-color .2s, background .2s;
  }
  .step-card .step-num  { font-size: 10px; color: var(--muted); }
  .step-card .step-icon { font-size: 20px; margin: 4px 0; }
  .step-card .step-name { font-size: 11px; color: var(--text); font-weight: 500; }
  .step-card .step-count { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .step-card.running  { border-color: var(--primary);  background: #1a2740; }
  .step-card.done     { border-color: var(--success);  background: #1a2d1a; }
  .step-card.error    { border-color: var(--error);    background: #2d1a1a; }

  .step-card.running .step-name { color: var(--primary); }
  .step-card.done    .step-name { color: var(--success); }
  .step-card.error   .step-name { color: var(--error);   }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  .step-card.running .step-icon { animation: pulse 1s infinite; }

  /* ── Creators strip ── */
  #creators-wrap { padding: 6px 14px 0; }
  #creators-wrap.empty { display: none; }
  #creators-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  #creators-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .creator-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    width: 120px;
    flex-shrink: 0;
  }
  .creator-card .creator-id { font-size: 9px; color: var(--muted); font-family: monospace; margin-bottom: 4px; }
  .creator-card img { width: 100%; height: 88px; object-fit: cover; border-radius: 6px; background: var(--bg); display: block; }
  .creator-card .no-img { width: 100%; height: 88px; border-radius: 6px; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; }
  .creator-card audio { width: 100%; height: 28px; margin-top: 4px; }
  .creator-card .no-audio { font-size: 9px; color: var(--muted); margin-top: 4px; display: block; }

  /* ── Items grid ── */
  #items-panel { grid-column: 2; grid-row: 2; overflow-y: auto; }

  #items-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
    align-content: flex-start;
  }

  .item-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    width: 360px;
    flex-shrink: 0;
    transition: border-color .2s;
  }
  .item-card .item-head { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; margin-bottom:6px; }
  .item-card .item-id   { font-size: 10px; color: var(--muted); font-family: monospace; word-break: break-all; }
  .item-card .item-hook { font-size: 12px; color: var(--text-hi); margin: 3px 0; font-weight: 600; overflow-wrap: anywhere; }
  .item-card .item-style {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--border);
    color: var(--muted);
    margin-bottom: 4px;
  }
  .item-card .item-status { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .item-card .item-cost   { font-size: 10px; color: var(--muted); text-align: right; white-space: nowrap; }
  .item-card .item-assets { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
  .item-card .item-assets a {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--primary);
    text-decoration: none;
  }
  .item-card .item-assets a:hover { border-color: var(--primary); }

  .item-card.running     { border-color: var(--primary); }
  .item-card.distributed { border-color: var(--success); }
  .item-card.dropped     { border-color: var(--error); opacity: .6; }

  .item-timeline { display:flex; flex-direction:column; gap:8px; }
  .item-section { border-top:1px solid var(--border); padding-top:7px; }
  .item-section-title {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 4px;
  }
  .item-text {
    font-size: 11px;
    color: var(--text);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .qc-pass { color: var(--success); }
  .qc-fail { color: var(--error); }
  .artifact-grid { display:flex; flex-direction:column; gap:6px; }
  .artifact-entry { display:flex; flex-direction:column; gap:3px; }
  .artifact-label { font-size:10px; color:var(--primary); }
  .artifact-ref {
    font-size: 10px;
    color: var(--muted);
    font-family: "SF Mono", "Fira Code", Consolas, monospace;
    overflow-wrap: anywhere;
  }
  .artifact-entry img,
  .artifact-entry video {
    width: 100%;
    max-height: 180px;
    object-fit: contain;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .artifact-entry audio { width: 100%; height: 30px; }

  /* ── LLM stream ── */
  #llm-panel { grid-column: 3; grid-row: 1 / 3; border-right: none; }

  #llm-output {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    font-family: "SF Mono", "Fira Code", Consolas, monospace;
    font-size: 11px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .llm-stage-header {
    color: var(--primary);
    font-weight: 600;
    margin-top: 10px;
    margin-bottom: 2px;
    font-size: 11px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
  }
  .llm-stage-header:first-child { margin-top: 0; }

  .token { color: var(--text); }
  .token.thinking { color: var(--muted); font-style: italic; }

  /* ── Approval panel ── */
  #approval-panel {
    display: none;
    margin: 8px 14px;
    background: #1f2d1f;
    border: 1px solid var(--success);
    border-radius: 8px;
    padding: 10px;
  }
  #approval-panel.visible { display: block; }
  #approval-panel .ap-title { font-size: 11px; font-weight: 600; color: var(--success); margin-bottom: 8px; }
  #approval-panel .ap-creator { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  #approval-panel .ap-creator label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 11px; }
  #approval-panel .ap-creator input[type=checkbox] { width: auto; cursor: pointer; }
  #btn-approve {
    margin-top: 8px;
    width: 100%;
    background: var(--success);
    color: #0d1117;
    border: none;
    border-radius: 6px;
    padding: 6px;
    font-weight: 600;
    cursor: pointer;
    font-size: 12px;
  }
  #btn-approve:hover { opacity: .9; }

  /* ── History modal ── */
  #history-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #history-overlay.visible { display: flex; }
  #history-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 700px;
    max-width: 95vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  #history-modal .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600; font-size: 13px;
  }
  #history-modal .modal-close {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; line-height: 1;
  }
  #history-modal .modal-body {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start;
  }
  .hist-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    width: 120px;
  }
  .hist-card.approved { border-color: var(--success); }
  .hist-card.rejected { border-color: var(--error); opacity: .6; }
  .hist-card img { width: 100%; height: 80px; object-fit: cover; border-radius: 6px; background: var(--bg); }
  .hist-card .hist-id { font-size: 9px; color: var(--muted); font-family: monospace; margin-bottom: 4px; }
  .hist-card .hist-status { font-size: 9px; margin-top: 4px; }
  .hist-card.approved .hist-status { color: var(--success); }
  .hist-card.rejected .hist-status { color: var(--error); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>🎬 UGC Orchestrator</h1>
  <span id="run-badge">idle</span>
  <span id="run-id-label"></span>
  <button id="btn-history" onclick="openHistory()" style="margin-left:auto;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 12px;cursor:pointer;font-size:12px;">📋 Histórico</button>
</header>

<!-- History modal -->
<div id="history-overlay" onclick="if(event.target===this)closeHistory()">
  <div id="history-modal">
    <div class="modal-header">
      <span>Histórico de Creators</span>
      <button class="modal-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="modal-body" id="history-grid"></div>
  </div>
</div>

<div class="layout">

  <!-- Controls -->
  <div class="panel" id="controls">
    <div class="panel-title">Configuração</div>
    <div class="form-group">
      <label>Oferta / Produto</label>
      <input id="inp-offer" type="text" value="Serum anti-aging X" placeholder="ex: serum anti-aging">
    </div>
    <div class="form-group">
      <label>Batch (conceitos)</label>
      <input id="inp-batch" type="number" value="6" min="1" max="24">
    </div>
    <div class="form-group">
      <label>Plataforma</label>
      <select id="inp-platform">
        <option value="tiktok">TikTok</option>
        <option value="instagram">Instagram Reels</option>
        <option value="youtube">YouTube Shorts</option>
      </select>
    </div>
    <div class="form-group">
      <label>System prompt (creator)</label>
      <textarea id="inp-creator-prompt" rows="3" placeholder="ex: influencer jovem, estilo casual, pele clara"></textarea>
    </div>
    <div class="form-group">
      <label>System prompt (vídeo)</label>
      <textarea id="inp-video-prompt" rows="3" placeholder="ex: demonstra o produto no espelho, inicia com problema de pele"></textarea>
    </div>
    <button id="btn-start" onclick="startRun()">▶ Iniciar Pipeline</button>

    <!-- Painel de aceite humano (aparece ao receber awaiting_approval) -->
    <div id="approval-panel">
      <div class="ap-title">⏸ Aguardando aceite dos creators</div>
      <div id="approval-creators"></div>
      <button id="btn-approve" onclick="confirmApproval()">✓ Confirmar aceite</button>
    </div>
    <hr class="divider">
    <div id="summary-box">
      <div class="row"><span>Produzidos</span><span class="val" id="s-produced">—</span></div>
      <div class="row"><span>Aprovados</span><span class="val" id="s-approved">—</span></div>
      <div class="row"><span>Descartados</span><span class="val" id="s-dropped">—</span></div>
      <div class="row"><span>Custo (USD)</span><span class="val" id="s-cost">—</span></div>
      <div class="row"><span>Top hooks</span><span class="val" id="s-hooks">—</span></div>
    </div>
  </div>

  <!-- Pipeline steps -->
  <div class="panel" id="pipeline">
    <div class="panel-title">Pipeline</div>
    <div class="steps-grid" id="steps-grid"></div>
  </div>

  <!-- Items -->
  <div class="panel" id="items-panel">
    <div class="panel-title">Creators &amp; Itens</div>
    <div id="creators-wrap" class="empty">
      <div id="creators-label">Creators (rosto + voz)</div>
      <div id="creators-grid"></div>
    </div>
    <div class="panel-title">Itens <span id="items-count" style="color:var(--muted)"></span></div>
    <div id="items-grid"></div>
  </div>

  <!-- LLM stream -->
  <div class="panel" id="llm-panel">
    <div class="panel-title">Output LLM (streaming)</div>
    <div id="llm-output"><span style="color:var(--muted)">Aguardando início...</span></div>
  </div>

</div>

<script>
const STEPS = [
  { id:"roster",       num:3,  icon:"👤", label:"Creator Roster" },
  { id:"concepts",     num:1,  icon:"💡", label:"Conceitos"      },
  { id:"script",       num:2,  icon:"✍️", label:"Scripts"        },
  { id:"ltx",          num:4,  icon:"🎬", label:"Talking-Head"   },
  { id:"product_demo", num:5,  icon:"📦", label:"Product Demo"   },
  { id:"process_item", num:6,  icon:"⚡", label:"Exec. Paralela" },
  { id:"qc",           num:7,  icon:"✅", label:"QC"             },
  { id:"assembly",     num:8,  icon:"🎞️", label:"Montagem"       },
  { id:"distribution", num:9,  icon:"📲", label:"Distribuição"   },
  { id:"feedback",     num:10, icon:"📊", label:"Feedback"       },
];

// Alias: kling e seedance são parte do step 4 (talking-head)
const NODE_STEP_MAP = {
  kling: "ltx", seedance: "ltx", drop: "qc",
};

let stepState = {};   // node → "idle"|"running"|"done"
let itemsMap  = {};   // item_id → {...}
let currentStage = null;
let llmFirstToken = true;

function initSteps() {
  const grid = document.getElementById("steps-grid");
  grid.innerHTML = "";
  stepState = {};
  STEPS.forEach(s => {
    stepState[s.id] = "idle";
    const card = document.createElement("div");
    card.className = "step-card";
    card.id = `step-${s.id}`;
    card.innerHTML = `
      <div class="step-num">Step ${s.num}</div>
      <div class="step-icon">${s.icon}</div>
      <div class="step-name">${s.label}</div>
      <div class="step-count" id="step-count-${s.id}"></div>
    `;
    grid.appendChild(card);
  });
}

function setStep(node, state) {
  const canonical = NODE_STEP_MAP[node] || node;
  const card = document.getElementById(`step-${canonical}`);
  if (!card) return;
  // Only upgrade state: idle → running → done/error
  const rank = {idle:0, running:1, done:2, error:2};
  const cur = stepState[canonical] || "idle";
  if ((rank[state] || 0) > (rank[cur] || 0)) {
    stepState[canonical] = state;
    card.className = `step-card ${state}`;
  }
}

function incrStepCount(node, label) {
  const canonical = NODE_STEP_MAP[node] || node;
  const el = document.getElementById(`step-count-${canonical}`);
  if (!el) return;
  const n = (parseInt(el.dataset.n || "0", 10)) + 1;
  el.dataset.n = n;
  el.textContent = `${n} ${label}`;
}

function clearElement(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text != null) node.textContent = String(text);
  return node;
}

function appendSection(parent, title, contentNode) {
  const section = el("div", "item-section");
  section.appendChild(el("div", "item-section-title", title));
  section.appendChild(contentNode);
  parent.appendChild(section);
}

function renderableCreatorUri(uri) {
  if (!uri) return false;
  return /^(https?:\/\/|data:image\/|\/|\.\/|\.\.\/)/i.test(uri);
}

function mediaElementForArtifact(artifact) {
  if (!artifact || !artifact.renderable || !artifact.uri) return null;
  if (artifact.media_type === "image") {
    const img = document.createElement("img");
    img.src = artifact.uri;
    img.alt = artifact.kind || "artifact";
    return img;
  }
  if (artifact.media_type === "video") {
    const video = document.createElement("video");
    video.controls = true;
    video.preload = "metadata";
    video.src = artifact.uri;
    return video;
  }
  if (artifact.media_type === "audio") {
    const audio = document.createElement("audio");
    audio.controls = true;
    audio.preload = "none";
    audio.src = artifact.uri;
    return audio;
  }
  return null;
}

function appendArtifact(parent, artifact) {
  const entry = el("div", "artifact-entry");
  entry.appendChild(el("div", "artifact-label", artifact.kind || "artifact"));
  const media = mediaElementForArtifact(artifact);
  if (media) {
    entry.appendChild(media);
  } else {
    entry.appendChild(el("div", "artifact-ref", artifact.uri || "sem URI"));
  }
  parent.appendChild(entry);
}

function renderItem(item) {
  const concept = item.concept || {};
  const id = item.id || "?";
  let card = document.getElementById(`item-${id}`);
  if (!card) {
    card = document.createElement("div");
    card.className = "item-card";
    card.id = `item-${id}`;
    document.getElementById("items-grid").appendChild(card);
    updateItemsCount();
  }
  const status = item.distributed ? "✓ aprovado"
               : item.dropped     ? "✗ descartado"
               : `tentativa ${item.attempts ?? 0}`;
  const cls = item.distributed ? "distributed"
            : item.dropped     ? "dropped"
            : "running";
  card.className = `item-card ${cls}`;
  clearElement(card);

  const head = el("div", "item-head");
  const left = el("div");
  const idNode = el("div", "item-id");
  idNode.textContent = String(id).substring(0, 18);
  left.appendChild(idNode);
  const hookNode = el("div", "item-hook");
  hookNode.textContent = concept.hook || concept.angle || "—";
  left.appendChild(hookNode);
  left.appendChild(el("span", "item-style", concept.hook_style || item.tier || "—"));
  const right = el("div");
  right.appendChild(el("div", "item-status", status));
  right.appendChild(el("div", "item-cost", `$${(item.cost_usd || 0).toFixed(3)}`));
  head.appendChild(left);
  head.appendChild(right);
  card.appendChild(head);

  const timeline = el("div", "item-timeline");

  const conceptText = [
    concept.angle ? `Ângulo: ${concept.angle}` : "",
    concept.format ? `Formato: ${concept.format}` : "",
    concept.offer ? `Oferta: ${concept.offer}` : "",
  ].filter(Boolean).join("\n") || "Conceito recebido.";
  appendSection(timeline, "Conceito", el("div", "item-text", conceptText));

  if (item.script) {
    const scriptNode = el("pre", "item-text");
    scriptNode.textContent = item.script;
    appendSection(timeline, "Script", scriptNode);
  }

  if ((item.artifacts || []).length) {
    const artifacts = el("div", "artifact-grid");
    (item.artifacts || []).forEach(a => appendArtifact(artifacts, a));
    appendSection(timeline, "Mídia", artifacts);
  }

  if (item.qc) {
    const qc = item.qc;
    const qcText = el("div", "item-text");
    const verdict = el("span", qc.passed ? "qc-pass" : "qc-fail",
      `${qc.passed ? "pass" : "fail"} · score ${qc.score ?? "—"}`);
    qcText.appendChild(verdict);
    const reasons = (qc.reasons || []).join(", ");
    if (reasons) qcText.appendChild(document.createTextNode(`\n${reasons}`));
    appendSection(timeline, "QC", qcText);
  }

  if (item.assembled || item.distributed || item.dropped) {
    const finalText = [
      item.assembled ? `Final: ${item.assembled.uri}` : "",
      item.distributed ? "Distribuição agendada." : "",
      item.dropped ? "Item descartado." : "",
    ].filter(Boolean).join("\n");
    appendSection(timeline, "Final", el("div", "item-text", finalText || "Aguardando finalização."));
  }

  card.appendChild(timeline);
}

function renderCreator(c) {
  const id = c.id || "creator";
  const wrap = document.getElementById("creators-wrap");
  wrap.classList.remove("empty");
  let card = document.getElementById(`creator-${id}`);
  if (!card) {
    card = document.createElement("div");
    card.className = "creator-card";
    card.id = `creator-${id}`;
    document.getElementById("creators-grid").appendChild(card);
  }
  clearElement(card);
  card.appendChild(el("div", "creator-id", id));
  const imageUri = c.image_uri || c.image;
  if (renderableCreatorUri(imageUri)) {
    const link = document.createElement("a");
    link.href = imageUri;
    link.target = "_blank";
    link.rel = "noopener";
    const img = document.createElement("img");
    img.src = imageUri;
    img.alt = id;
    link.appendChild(img);
    card.appendChild(link);
  } else {
    const ref = el("div", "no-img", "ref");
    ref.title = imageUri || "sem imagem";
    card.appendChild(ref);
  }
  const previewUri = c.voice_preview_uri;
  if (previewUri && /^(https?:\/\/|data:audio\/|\/|\.\/|\.\.\/)/i.test(previewUri)) {
    const audio = document.createElement("audio");
    audio.controls = true;
    audio.preload = "none";
    audio.src = previewUri;
    card.appendChild(audio);
  } else {
    card.appendChild(el("span", "no-audio", c.voice_ref || c.voice || "sem voz"));
  }
}

function updateItemsCount() {
  const n = document.getElementById("items-grid").children.length;
  document.getElementById("items-count").textContent = `(${n})`;
}

function appendLLM(stage, token) {
  const out = document.getElementById("llm-output");

  if (stage !== currentStage) {
    currentStage = stage;
    llmFirstToken = true;
    const hdr = document.createElement("div");
    hdr.className = "llm-stage-header";
    hdr.textContent = `── ${stage} ──`;
    out.appendChild(hdr);
  }

  if (llmFirstToken) {
    // Clear placeholder
    if (out.querySelector("span[style]")) out.innerHTML = "";
    llmFirstToken = false;
  }

  // Append token as text node
  out.appendChild(document.createTextNode(token));
  out.scrollTop = out.scrollHeight;
}

function clearLLM() {
  const out = document.getElementById("llm-output");
  out.innerHTML = '<span style="color:var(--muted)">Aguardando LLM...</span>';
  currentStage = null;
  llmFirstToken = true;
}

function setBadge(state, label) {
  const b = document.getElementById("run-badge");
  b.className = state;
  b.textContent = label;
}

function updateSummary(s) {
  document.getElementById("s-produced").textContent = s.produced ?? "—";
  document.getElementById("s-approved").textContent = s.approved ?? "—";
  document.getElementById("s-dropped").textContent  = s.dropped  ?? "—";
  document.getElementById("s-cost").textContent     = s.total_cost_usd != null ? `$${s.total_cost_usd.toFixed(4)}` : "—";
  document.getElementById("s-hooks").textContent    = (s.winning_styles || []).join(", ") || "—";
  document.getElementById("summary-box").classList.add("visible");
}

let eventSource = null;
let currentRunId = null;
let pendingApprovalCreators = [];

async function startRun() {
  const btn    = document.getElementById("btn-start");
  const offer  = document.getElementById("inp-offer").value.trim() || "demo offer";
  const batch  = parseInt(document.getElementById("inp-batch").value, 10) || 6;
  const platform = document.getElementById("inp-platform").value;
  const creatorPrompt = document.getElementById("inp-creator-prompt").value.trim() || null;
  const videoPrompt   = document.getElementById("inp-video-prompt").value.trim() || null;

  btn.disabled = true;
  initSteps();
  itemsMap = {};
  document.getElementById("items-grid").innerHTML = "";
  document.getElementById("creators-grid").innerHTML = "";
  document.getElementById("creators-wrap").classList.add("empty");
  document.getElementById("approval-panel").classList.remove("visible");
  updateItemsCount();
  clearLLM();
  document.getElementById("summary-box").classList.remove("visible");
  setBadge("running", "iniciando...");

  if (eventSource) { eventSource.close(); eventSource = null; }

  // Inicia o run
  let runId;
  try {
    const resp = await fetch("/api/run", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({offer, batch, platform, creator_prompt: creatorPrompt, video_prompt: videoPrompt}),
    });
    const data = await resp.json();
    runId = data.run_id;
  } catch (e) {
    setBadge("error", "erro ao iniciar");
    btn.disabled = false;
    return;
  }

  currentRunId = runId;
  document.getElementById("run-id-label").textContent = runId;
  setBadge("running", "rodando");

  // Conecta SSE
  eventSource = new EventSource(`/api/stream/${runId}`);

  eventSource.onmessage = (e) => {
    let ev;
    try { ev = JSON.parse(e.data); } catch { return; }

    switch (ev.type) {
      case "run_start":
        setBadge("running", "rodando");
        break;

      case "node_start":
        setStep(ev.node, "running");
        setBadge("running", ev.label || ev.node);
        break;

      case "node_end":
        setStep(ev.node, "done");
        if (ev.node === "process_item") incrStepCount("process_item", "itens");
        if (ev.item) renderItem(ev.item);
        break;

      case "item_update":
        if (ev.item) renderItem(ev.item);
        break;

      case "creator_ready":
        if (ev.creator) renderCreator(ev.creator);
        break;

      case "awaiting_approval":
        showApprovalPanel(ev.creators || []);
        setBadge("running", "aguardando aceite");
        break;

      case "llm_start":
        currentStage = ev.stage;
        break;

      case "llm_token":
        appendLLM(ev.stage, ev.token);
        break;

      case "llm_end":
        break;

      case "run_end":
        setBadge("done", "concluído");
        if (ev.summary) updateSummary(ev.summary);
        document.getElementById("approval-panel").classList.remove("visible");
        btn.disabled = false;
        eventSource.close();
        break;

      case "error":
        setBadge("error", "erro");
        appendLLM("ERRO", "\n" + (ev.message || "erro desconhecido"));
        document.getElementById("approval-panel").classList.remove("visible");
        btn.disabled = false;
        eventSource.close();
        break;

      case "stream_end":
        if (document.getElementById("run-badge").textContent === "rodando" ||
            document.getElementById("run-badge").textContent === "aguardando aceite") {
          setBadge("done", "concluído");
        }
        btn.disabled = false;
        eventSource.close();
        break;
    }
  };

  eventSource.onerror = () => {
    setBadge("error", "conexão perdida");
    btn.disabled = false;
  };
}

function showApprovalPanel(creators) {
  pendingApprovalCreators = creators;
  const panel = document.getElementById("approval-panel");
  const container = document.getElementById("approval-creators");
  clearElement(container);
  creators.forEach(c => {
    const div = document.createElement("div");
    div.className = "ap-creator";
    const label = document.createElement("label");
    const input = document.createElement("input");
    input.type = "checkbox";
    input.checked = true;
    input.value = c.id || "";
    label.appendChild(input);
    label.appendChild(el("span", null, c.id || "creator"));
    div.appendChild(label);
    container.appendChild(div);
  });
  panel.classList.add("visible");
}

async function confirmApproval() {
  if (!currentRunId) return;
  const checkboxes = document.querySelectorAll("#approval-creators input[type=checkbox]");
  const approved = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
  try {
    await fetch(`/api/approve/${currentRunId}`, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({approved}),
    });
    document.getElementById("approval-panel").classList.remove("visible");
    setBadge("running", "retomando...");
  } catch (e) {
    appendLLM("ERRO", "\nErro ao confirmar aceite: " + e.message);
  }
}

async function openHistory() {
  const grid = document.getElementById("history-grid");
  clearElement(grid);
  const loading = el("span", null, "Carregando...");
  loading.style.color = "var(--muted)";
  loading.style.fontSize = "12px";
  grid.appendChild(loading);
  document.getElementById("history-overlay").classList.add("visible");
  try {
    const resp = await fetch("/api/creators");
    const data = await resp.json();
    renderHistory(data.creators || []);
  } catch (e) {
    clearElement(grid);
    const error = el("span", null, `Erro: ${e.message}`);
    error.style.color = "var(--error)";
    error.style.fontSize = "12px";
    grid.appendChild(error);
  }
}

function closeHistory() {
  document.getElementById("history-overlay").classList.remove("visible");
}

function renderHistory(creators) {
  const grid = document.getElementById("history-grid");
  clearElement(grid);
  if (!creators.length) {
    const empty = el("span", null, "Nenhum creator salvo.");
    empty.style.color = "var(--muted)";
    empty.style.fontSize = "12px";
    grid.appendChild(empty);
    return;
  }
  creators.forEach(c => {
    const card = document.createElement("div");
    card.className = `hist-card ${c.status === "approved" ? "approved" : "rejected"}`;
    const title = [
      c.offer ? `Oferta: ${c.offer}` : "",
      c.creator_prompt ? `Creator prompt: ${c.creator_prompt}` : "",
      c.video_prompt ? `Video prompt: ${c.video_prompt}` : "",
      `Run: ${c.run_id}`,
    ].filter(Boolean).join("\n");
    const idNode = el("div", "hist-id", c.creator_id || c.id || "creator");
    idNode.title = title;
    card.appendChild(idNode);
    const imageUri = c.image_uri || c.image;
    if (renderableCreatorUri(imageUri)) {
      const img = document.createElement("img");
      img.src = imageUri;
      img.alt = c.creator_id || c.id || "creator";
      img.title = title;
      card.appendChild(img);
    } else {
      const noImg = el("div", null, "ref");
      noImg.style.height = "80px";
      noImg.style.background = "var(--bg)";
      noImg.style.borderRadius = "6px";
      noImg.style.display = "flex";
      noImg.style.alignItems = "center";
      noImg.style.justifyContent = "center";
      noImg.style.color = "var(--muted)";
      noImg.title = imageUri || "sem imagem";
      card.appendChild(noImg);
    }
    card.appendChild(el("div", "hist-status", c.status === "approved" ? "✓ aprovado" : "✗ rejeitado"));
    grid.appendChild(card);
  });
}

// Inicializar steps no load
initSteps();
</script>
