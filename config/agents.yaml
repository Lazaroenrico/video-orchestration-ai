# Catalogo declarativo para D29.
# Fase 0 (agent activation): os stages LLM-only rodam o loop agentic (critique->refine)
# pelo adapter llm (run_stage_agent). Os demais stages seguem em modo tool direto
# (LangGraph node -> typed tool -> adapter); media agentic e fase posterior (D29 Fase 6).
stages:
  concepts:
    executor: agent
    tools: [generate_concepts]
    target_model: null
    target_agent: null
    agent_enabled: true
  scripts:
    executor: agent
    tools: [write_script]
    target_model: null
    target_agent: null
    agent_enabled: true
  roster:
    executor: tool
    tools: [build_creator]
    target_model: null
    target_agent: null
    agent_enabled: false
  video:
    executor: tool
    tools: [generate_clip]
    target_model: null
    target_agent: null
    agent_enabled: false
  qc:
    executor: tool
    tools: [qc_check]
    target_model: null
    target_agent: null
    agent_enabled: false
  assembly:
    executor: tool
    tools: [assemble_video]
    target_model: null
    target_agent: null
    agent_enabled: false
  upscale:
    executor: tool
    tools: [upscale_video]
    target_model: null
    target_agent: null
    agent_enabled: false
