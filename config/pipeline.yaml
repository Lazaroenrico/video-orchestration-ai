# Parâmetros da pipeline. A topologia do grafo é fixa no builder (v1); este arquivo
# ajusta os "knobs" (tamanho de batch, concorrência, QC, custo/concorrência por tier).
batch:
  default_size: 12
  max_concurrency: 8        # fan-out paralelo no nível do item (RunnableConfig.max_concurrency)

qc:
  max_attempts: 3           # tentativas antes de descartar um item (Step 7 regen loop)
  fail_rate: 0.34           # fração determinística reprovada no mock (exercita o loop)
  required_clip_count: 2    # live: talking-head + product demo precisam existir antes da montagem

video:
  allow_mock_fallback: false # live: tiers sem adapter real falham explicitamente em vez de gerar mock

# Roteamento + custo por tier (Step 4 / "The Cost at Scale" do Context.md).
# No fluxo atual, tentativas de QC permanecem em LTX; tiers premium ficam listados
# para configuração futura, mas não são escolhidos automaticamente pelo roteador.
tiers:
  - name: ltx
    model: lightricks/ltx-2.3-fast
    cost_per_second: 0.01
    max_concurrency: 16     # barato: alta concorrência (bulk de testes)
  - name: kling
    model: kling-3.0
    cost_per_second: 0.10
    max_concurrency: 6      # sinal: reprodução mais limpa
  - name: seedance
    model: seedance-2.0
    cost_per_second: 0.168
    max_concurrency: 2      # premium: vencedores, baixa concorrência

clip:
  duration_seconds: 8
  resolution: 1080p
  aspect_ratio: "9:16"
  fps: 25
  camera_motion: static
  generate_audio: false

assembly:
  model: bytedance/seedance-2.0
  duration_seconds: 8
  resolution: 1080x1920
  aspect_ratio: "9:16"
  generate_audio: false
  timeout_ms: 900000

roster:
  creators: 2               # quantos creators reutilizáveis no roster (Step 3)
